{% if has_topics %}
<div class="overflow-x-auto rounded border border-base-300 bg-base-100">
  <table class="table table-sm">
    <thead>
      <tr>
        <th>Name</th>
        <th>Scope</th>
        <th class="text-right">Subscriptions</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for topic in topics %}
      <tr class="hover:bg-base-200/70">
        <td>
          <div class="font-bold">{{ topic.name }}</div>
          <div class="text-xs text-base-content/50">id {{ topic.id }}</div>
        </td>
        <td>
          <div class="font-mono text-sm">{{ topic.region }}</div>
          <div class="font-mono text-xs text-base-content/50">{{ topic.account_id }}</div>
        </td>
        <td class="text-right">{{ topic.subscription_count }}</td>
        <td class="text-right">
          <a class="btn btn-sm btn-primary" href="/sns/topics/{{ topic.id }}">Open</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
{{ empty_state_html|safe }}
{% endif %}
