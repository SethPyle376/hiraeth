{% if has_topics %}
<div class="overflow-x-auto rounded-lg border border-base-300 bg-base-100 shadow-sm">
  <table class="table table-sm">
    <thead>
      <tr class="border-b border-base-300 bg-base-200/50 text-xs font-semibold uppercase tracking-wider">
        <th class="py-3">Name</th>
        <th class="py-3">Scope</th>
        <th class="py-3 text-right">Subscriptions</th>
        <th class="py-3"></th>
      </tr>
    </thead>
    <tbody>
      {% for topic in topics %}
      <tr class="hover:bg-base-200/60 transition-colors">
        <td class="py-3">
          <div class="font-semibold">{{ topic.name }}</div>
          <div class="text-xs text-base-content/50">id {{ topic.id }}</div>
        </td>
        <td class="py-3">
          <div class="font-mono text-sm">{{ topic.region }}</div>
          <div class="font-mono text-xs text-base-content/50">{{ topic.account_id }}</div>
        </td>
        <td class="py-3 text-right">
          <span class="badge badge-outline">{{ topic.subscription_count }}</span>
        </td>
        <td class="py-3 text-right">
          <a class="btn btn-sm btn-primary" href="/sns/topics/{{ topic.id }}">Open</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
{{ empty_state_html|safe }}
{% endif %}
