{% extends "layout.html" %}

{% block title %}Hiraeth Error{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl py-16">
  <div class="card border border-error/20 bg-base-100 shadow-sm">
    <div class="card-body p-8">
      <div class="flex flex-wrap items-center gap-3">
        <span class="badge badge-error badge-lg">{{ status_code }}</span>
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-error">Request failed</p>
      </div>
      <h1 class="mt-4 text-4xl font-black tracking-tight">{{ title }}</h1>
      <p class="mt-3 text-base leading-relaxed text-base-content/70">{{ message }}</p>
      <div class="card-actions mt-8">
        <a class="btn btn-primary" href="/">Back to home</a>
        <a class="btn btn-outline" href="/sqs">Open SQS</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
