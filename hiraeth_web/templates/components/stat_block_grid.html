<div class="{{ grid.grid_class }}">
  {% for block in grid.blocks %}
  <div class="stats border border-base-300 bg-base-100">
    <div class="stat">
      <div class="stat-title">{{ block.title }}</div>
      <div class="stat-value {{ block.value_class }}">{{ block.value }}</div>
      <div class="stat-desc">{{ block.description }}</div>
    </div>
  </div>
  {% endfor %}
</div>
