<div class="{{ grid.grid_class }}">
  {% for card in grid.cards %}
  <div class="card border border-base-300 bg-base-100 shadow-sm">
    <div class="card-body p-5">
      <div class="text-xs font-semibold uppercase tracking-wider text-base-content/50">{{ card.title }}</div>
      <div class="mt-1 text-3xl font-black {{ card.value_class }}">{{ card.value }}</div>
      <div class="mt-1 text-xs text-base-content/50">{{ card.description }}</div>
    </div>
  </div>
  {% endfor %}
</div>
