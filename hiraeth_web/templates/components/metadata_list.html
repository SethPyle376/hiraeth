<div class="space-y-3 text-sm">
  {% for entry in list.entries %}
  <div class="flex flex-col gap-0.5 sm:flex-row sm:gap-3">
    <dt class="shrink-0 text-xs font-semibold uppercase tracking-wider text-base-content/40 sm:w-28">{{ entry.label }}</dt>
    <dd class="break-all {{ entry.value_class }}">{{ entry.value }}</dd>
  </div>
  {% endfor %}
</div>
