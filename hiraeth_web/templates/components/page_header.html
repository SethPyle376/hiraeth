<div class="mb-8">
  <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-primary">{{ header.eyebrow }}</p>
      <h1 class="mt-2 text-4xl font-black tracking-tight text-base-content md:text-5xl">{{ header.title }}</h1>
      <p class="mt-3 max-w-2xl text-sm leading-relaxed text-base-content/70">
        {{ header.description }}
      </p>
    </div>
    {% if !header.actions.is_empty() %}
    <div class="flex flex-wrap gap-2">
      {% for action in header.actions %}
        {% match action.href %}
          {% when Some with (href) %}
          <a class="{{ action.button_class }}" href="{{ href }}">{{ action.label }}</a>
          {% when None %}
          <span class="{{ action.button_class }}">{{ action.label }}</span>
        {% endmatch %}
      {% endfor %}
    </div>
    {% endif %}
  </div>
  <div class="mt-6 h-px bg-gradient-to-r from-primary/30 via-base-300 to-transparent"></div>
</div>
