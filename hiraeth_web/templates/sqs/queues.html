{% extends "layout.html" %}

{% block title %}Hiraeth SQS Queues{% endblock %}

{% block content %}
<section class="mx-auto max-w-7xl">
  <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.35em] text-primary">SQS</p>
      <h1 class="mt-2 text-5xl font-black tracking-tight">Queues</h1>
      <p class="mt-3 text-base-content/70">
        Viewing account <span class="font-mono">{{ account_id }}</span> in <span class="font-mono">{{ region }}</span>.
      </p>
    </div>
    <a class="btn btn-ghost" href="/sqs">Back to SQS</a>
  </div>

  <form class="card mb-6 border border-base-300 bg-base-100 shadow-sm"
        action="/sqs/queues"
        method="get"
        hx-get="/sqs/fragments/queues"
        hx-target="#queue-list"
        hx-push-url="true">
    <div class="card-body grid gap-4 md:grid-cols-[1fr_1fr_1fr_auto] md:items-end">
      <label class="form-control">
        <div class="label"><span class="label-text">Region</span></div>
        <input class="input input-bordered" name="region" value="{{ region }}">
      </label>
      <label class="form-control">
        <div class="label"><span class="label-text">Account ID</span></div>
        <input class="input input-bordered font-mono" name="account_id" value="{{ account_id }}">
      </label>
      <label class="form-control">
        <div class="label"><span class="label-text">Name prefix</span></div>
        <input class="input input-bordered" name="prefix" value="{{ prefix }}" placeholder="optional">
      </label>
      <button class="btn btn-primary" type="submit">Refresh</button>
    </div>
  </form>

  <div id="queue-list">
    {% include "sqs/fragments/queue_list.html" %}
  </div>
</section>
{% endblock %}
