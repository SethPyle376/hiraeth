name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install SQLx CLI
        run: cargo install sqlx-cli --version 0.8.6 --no-default-features --features sqlite --locked

      - name: Prepare local SQLite database
        run: cargo run -p xtask -- prepare-db

      - name: Check SQLx offline metadata
        run: DATABASE_URL=sqlite://.local/db.sqlite cargo sqlx prepare --workspace --check -- --all-targets

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: hiraeth:ci

      - name: Report image size
        run: |
          bytes="$(docker image inspect hiraeth:ci --format='{{.Size}}')"
          mib="$(awk "BEGIN { printf \"%.2f\", ${bytes} / 1024 / 1024 }")"
          echo "Docker image size: ${mib} MiB (${bytes} bytes)"
          echo "### Docker image size" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`hiraeth:ci\`: ${mib} MiB (${bytes} bytes)" >> "$GITHUB_STEP_SUMMARY"
